services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./Frontend/smart-service-booking
      dockerfile: Dockerfile   # 🔥 force explicit
      args:
        VITE_API_BASE_URL: http://backend:5000
    ports:
      - "8080:80"
    depends_on:
      - backend
