services:
  backend:
    build:
      context: ./Backend
    container_name: backend
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend/smart-service-booking
      args:
        VITE_API_BASE_URL: http://backend:5000
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
